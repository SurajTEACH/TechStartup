<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0EA5FF"/>
      <stop offset="100%" stop-color="#0047FF"/>
    </linearGradient>

    <linearGradient id="gradOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="100%" stop-color="#FF5C00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="120" fill="#020817"/>

  <!-- Main C Shape -->
  <path d="M760 220
           C670 120 540 70 400 95
           C215 130 90 290 90 510
           C90 730 220 895 410 925
           C560 950 690 900 785 790
           L690 710
           C625 790 535 835 430 820
           C290 800 190 680 190 510
           C190 340 290 220 430 200
           C535 185 625 225 690 305
           Z"
        fill="url(#gradBlue)"/>

  <!-- Orange lower arc -->
  <path d="M690 710
           C625 790 535 835 430 820
           C350 808 280 765 230 700
           L145 770
           C220 860 320 920 430 935
           C575 955 705 900 800 790
           Z"
        fill="url(#gradOrange)"/>

  <!-- Bridge -->
  <g transform="translate(235 310)">
    <path d="M60 290 L380 290" stroke="white" stroke-width="18"/>
    <path d="M90 290 C120 120 320 120 350 290" stroke="white" stroke-width="16" fill="none"/>

    <!-- Towers -->
    <rect x="120" y="80" width="24" height="210" fill="white"/>
    <rect x="286" y="80" width="24" height="210" fill="white"/>

    <!-- Suspension lines -->
    <line x1="132" y1="90" x2="70" y2="290" stroke="white" stroke-width="5"/>
    <line x1="132" y1="90" x2="110" y2="290" stroke="white" stroke-width="5"/>
    <line x1="132" y1="90" x2="155" y2="290" stroke="white" stroke-width="5"/>
    <line x1="132" y1="90" x2="200" y2="290" stroke="white" stroke-width="5"/>

    <line x1="298" y1="90" x2="240" y2="290" stroke="white" stroke-width="5"/>
    <line x1="298" y1="90" x2="285" y2="290" stroke="white" stroke-width="5"/>
    <line x1="298" y1="90" x2="330" y2="290" stroke="white" stroke-width="5"/>
    <line x1="298" y1="90" x2="370" y2="290" stroke="white" stroke-width="5"/>
  </g>

  <!-- Pixel effect -->
  <g fill="#1D9BFF">
    <rect x="80" y="360" width="18" height="18"/>
    <rect x="55" y="390" width="18" height="18"/>
    <rect x="85" y="420" width="18" height="18"/>
    <rect x="115" y="390" width="18" height="18"/>
    <rect x="140" y="360" width="18" height="18"/>
  </g>

  <g fill="#FF7A00">
    <rect x="135" y="600" width="18" height="18"/>
    <rect x="105" y="630" width="18" height="18"/>
    <rect x="165" y="630" width="18" height="18"/>
    <rect x="135" y="660" width="18" height="18"/>
  </g>
</svg>
